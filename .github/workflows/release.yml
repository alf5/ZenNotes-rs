name: Release

# Publishes desktop bundles to a GitHub Release on every v* tag.
# Builds run on native runners (the only reliable way to build a Tauri app per
# platform): macOS for both arches, Ubuntu for Linux (AppImage + .deb).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish a release for
        required: true
        default: v2.1.0

permissions:
  contents: write

# The release tag: the pushed tag, or the manually-dispatched one.
env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" \
              --title "SynNotes $RELEASE_TAG" \
              --notes "SynNotes $RELEASE_TAG — a Tauri v2 desktop build.

          Downloads:
          - macOS (Apple Silicon): \`*_aarch64.dmg\`
          - macOS (Intel): \`*_x64.dmg\`
          - Linux: \`*.AppImage\` and \`*.deb\`

          macOS builds are unsigned/un-notarized — on first launch, right-click → Open (or run \`xattr -dr com.apple.quarantine /Applications/SynNotes.app\`)."
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app (npm runner — avoids tauri-action's bun autodetect)
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Upload macOS bundles
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg \
            -R "$GITHUB_REPOSITORY" --clobber

      - name: Upload Linux bundles
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/deb/*.deb \
            -R "$GITHUB_REPOSITORY" --clobber

  # The headless `zen` CLI shares synnotes-core (no WebKit/GTK), so it builds as
  # a fully static x86_64-unknown-linux-musl binary that runs on any Linux
  # distro, plus native macOS binaries. Uploaded as raw downloadable assets.
  cli:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            asset: syncnotes-x86_64-unknown-linux-musl
          - platform: macos-latest
            target: aarch64-apple-darwin
            asset: syncnotes-aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            asset: syncnotes-x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./crates/zen-cli -> target

      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build zen CLI (static on musl)
        working-directory: crates/zen-cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage and upload the binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "crates/zen-cli/target/${{ matrix.target }}/release/syncnotes" "${{ matrix.asset }}"
          file "${{ matrix.asset }}"
          gh release upload "$RELEASE_TAG" "${{ matrix.asset }}" -R "$GITHUB_REPOSITORY" --clobber
