name: Release

# Publishes desktop bundles to a GitHub Release on every v* tag.
# Builds run on native runners (the only reliable way to build a Tauri app per
# platform): macOS for both arches, Ubuntu for Linux (AppImage + .deb).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish a release for
        required: true
        default: v2.1.0

permissions:
  contents: write

# The release tag: the pushed tag, or the manually-dispatched one.
env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" \
              --title "ZenNotes-rs $RELEASE_TAG" \
              --notes "ZenNotes-rs $RELEASE_TAG — a Tauri v2 desktop build.

          Downloads:
          - macOS (Apple Silicon): \`*_aarch64.dmg\`
          - macOS (Intel): \`*_x64.dmg\`
          - Linux: \`*.AppImage\` and \`*.deb\`
          - Windows: \`*-setup.exe\` (NSIS installer) or \`*.msi\`

          macOS builds are unsigned/un-notarized — on first launch, right-click → Open (or run \`xattr -dr com.apple.quarantine /Applications/ZenNotes-rs.app\`).
          Windows builds are unsigned — SmartScreen may warn on first run; choose More info → Run anyway."
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
            args: ''
          - platform: windows-latest
            # Empty target → host default (x86_64-pc-windows-msvc); keeps the
            # bundle path flat like Linux. WebView2 + MSVC are preinstalled and
            # the Tauri bundler fetches NSIS/WiX itself, so no system-deps step.
            target: ''
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app (npm runner — avoids tauri-action's bun autodetect)
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Upload macOS bundles
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg \
            -R "$GITHUB_REPOSITORY" --clobber

      - name: Upload Linux bundles
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/deb/*.deb \
            -R "$GITHUB_REPOSITORY" --clobber

      - name: Upload Windows bundles
        if: runner.os == 'Windows'
        # bash (Git Bash, preinstalled) so the globs expand — the default
        # Windows shell is PowerShell, which would pass '*.exe' to gh literally.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            src-tauri/target/release/bundle/nsis/*-setup.exe \
            src-tauri/target/release/bundle/msi/*.msi \
            -R "$GITHUB_REPOSITORY" --clobber
